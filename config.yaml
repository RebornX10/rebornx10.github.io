server:
  host: 127.0.0.1
  port: 8000
  open_browser: true
  log_level: INFO          # DEBUG for even more detail

openalex:
  mailto: kiki.brettl@gmail.com
  per_page: 200
  default_search: null
  default_filters: "from_publication_date:2022-01-01"
  max_papers: 25
  max_papers_cap: 1000000  # hard ceiling; the RAM-based cap + runtime guard are the real limits

download:
  # Downloads are I/O-bound (most time is spent waiting on the network), so we
  # oversubscribe CPU threads: workers = available CPU threads x io_multiplier,
  # capped at io_workers_cap. Benchmarked ~6x faster than 1-worker-per-CPU.
  workers: null            # null = auto (I/O oversubscription below); set an int to force
  io_multiplier: 8         # download workers per available CPU thread (I/O-bound)
  io_workers_cap: 32       # ceiling on concurrent downloads (politeness + diminishing returns)
  thread_fraction: 0.8     # share of CPU threads for CPU-bound work (PDF parse sizing)
  paper_deadline_s: 15     # per-paper time budget (lower = faster, drops slow stragglers)
  parse_in_process: false  # parse PDFs in a process pool (hard timeout / crash isolation)
  max_pdf_bytes: 80000000  # max PDF size read into memory (the per-download cache)
  connect_timeout: 5
  read_timeout: 20
  max_chars: 2000000       # full text kept per paper in memory (the per-paper cache)
  output_basename: papers
  checkpoint_every: 0      # write <basename>.partial.parquet every N papers (0 = off)
  ram_fraction: 0.85       # fraction of available RAM the corpus may use (peak)
  ram_per_paper_mb: 0.06   # est. peak memory per paper (runtime guard is the real safety net)
  ram_guard_pct: 85        # abort a build if projected peak RAM would exceed this
  ram_target_pct: 80       # suggested cap aims to keep peak RAM at/below this

ollama:
  url: http://localhost:11434
  model: null
  request_timeout: 300
  keep_alive: 30m          # keep the model resident between questions (avoids slow cold reloads)
  num_ctx: 4096            # context window: fits the excerpts + answer without truncation, bounds prefill
  num_predict: null        # max answer tokens (null = model default; set e.g. 800 to cap long answers)
  warm_on_start: true      # preload the model at startup and after each build so the first answer is fast

retrieval:
  top_k: 5
  context_budget: 9000
  rerank: auto             # embedding re-rank of BM25 hits: auto | on | off
  embed_model: nomic-embed-text  # Ollama embedding model (auto-used only if installed)
  rerank_k: 30             # BM25 candidates to re-rank by embedding similarity
  chunk: true              # index sub-document passages (better recall on long papers)
  chunk_size: 1200         # characters per chunk
  chunk_overlap: 200       # overlap between consecutive chunks
  multi_query: false       # expand the question into variants (LLM) and fuse results
  mq_count: 3              # number of query variants when multi_query is on
  verify: false            # after answering, fact-check the answer against the sources (LLM)

theme:
  anthropic_model: claude-opus-4-8 # claude-haiku-4-5-20251001
