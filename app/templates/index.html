<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global Paper Research Assistant</title>
<style>
  :root { --bg:#0f1117; --card:#1a1d27; --line:#2a2f3e; --fg:#e6e9ef;
          --muted:#9aa3b2; --accent:#6ea8fe; --ok:#3fb950; --input:#0f1117; }
  :root.light { --bg:#f5f7fb; --card:#ffffff; --line:#dde3ec; --fg:#1a1d27;
                --muted:#5b6472; --accent:#2563eb; --ok:#1a9e4b; --input:#f0f3f8; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg);
         transition:background .2s,color .2s; }
  .wrap { max-width:1080px; margin:34px auto; padding:0 20px; }
  .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 18px; font-size:13px; }
  .themebtn { margin:0; padding:8px 12px; background:var(--card); color:var(--fg);
              border:1px solid var(--line); border-radius:8px; cursor:pointer; font-size:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:20px; margin-bottom:18px; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input { width:100%; padding:10px 12px; background:var(--input); border:1px solid var(--line);
          border-radius:8px; color:var(--fg); font-size:14px; }
  .row { display:flex; gap:12px; } .row > div { flex:1; }
  button { margin-top:14px; padding:10px 16px; background:var(--accent); color:#fff;
           border:0; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .bar { height:10px; background:var(--input); border:1px solid var(--line); border-radius:6px;
         overflow:hidden; margin-top:14px; }
  .bar > i { display:block; height:100%; width:0; background:var(--accent); transition:width .3s; }
  .stage { font-size:12px; color:var(--muted); margin-top:8px; min-height:16px; }
  .answer { white-space:pre-wrap; background:var(--input); border:1px solid var(--line);
            border-radius:8px; padding:14px; margin-top:14px; }
  .src { font-size:12px; color:var(--muted); margin-top:10px; }
  .disabled { opacity:.45; pointer-events:none; }
  .pill { font-size:11px; color:var(--muted); }
  .warn { color:#e3b341; font-size:13px; margin-bottom:12px; }
  /* layout */
  .layout { display:flex; gap:18px; align-items:flex-start; }
  .layout main { flex:1; min-width:0; }
  .metrics { width:260px; flex-shrink:0; }
  .metrics h2 { font-size:13px; text-transform:uppercase; letter-spacing:1px;
                color:var(--muted); margin:0 0 6px; }
  .metric { margin-bottom:14px; }
  .metric .top { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
  .metric .top b { font-weight:600; }
  .metric canvas { width:100%; height:44px; display:block;
                   background:var(--input); border:1px solid var(--line); border-radius:6px; }
  @media (max-width:780px){ .layout{ flex-direction:column; } .metrics{ width:100%; } }
  /* fun zone */
  .fun { display:none; text-align:center; margin-top:16px; }
  .watch { font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:1px; }
  .eta { font-size:12px; color:var(--muted); margin-top:2px; }
  .bounce { font-size:24px; letter-spacing:10px; margin:6px 0; }
  .bounce span { display:inline-block; animation:bob 1.1s infinite ease-in-out; }
  .bounce span:nth-child(2){ animation-delay:.12s; }
  .bounce span:nth-child(3){ animation-delay:.24s; }
  .bounce span:nth-child(4){ animation-delay:.36s; }
  .bounce span:nth-child(5){ animation-delay:.48s; }
  @keyframes bob { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
  .quip { color:var(--muted); font-size:13px; font-style:italic; min-height:18px; transition:opacity .25s; }
</style></head>
<body><div class="wrap">
  <div class="topbar">
    <div>
      <h1>🔬 Global Paper Research Assistant</h1>
      <p class="sub">Open-access papers via OpenAlex · answers via global Ollama
         (<span class="pill">{{MODEL}}</span>)</p>
    </div>
    <button id="theme" class="themebtn" title="Toggle light / dark">🌙</button>
  </div>
  <div class="warn">{{BANNER}}</div>

  <div class="layout">
    <main>
      <div class="card">
        <label>Research topic</label>
        <input id="topic" placeholder="e.g. CRISPR gene editing">
        <div class="row">
          <div><label>From date</label><input id="from" type="date"></div>
          <div><label>To date</label><input id="to" type="date"></div>
          <div><label>Max papers</label><input id="n" type="number" value="25" min="1" max="{{MAX_PAPERS}}"></div>
        </div>
        <button id="go">Download topic</button>
        <div class="bar"><i id="bar"></i></div>
        <div class="stage" id="stage"></div>
        <div class="fun" id="fun">
          <div class="bounce"><span>📄</span><span>🔬</span><span>🧪</span><span>📊</span><span>🧬</span></div>
          <div class="watch">⏱ <span id="watch">0:00</span></div>
          <div class="eta" id="eta"></div>
          <div class="quip" id="quip"></div>
        </div>
      </div>

      <div class="card disabled" id="qa">
        <label>Ask a question about this topic</label>
        <input id="q" placeholder="What are the main findings?">
        <button id="ask">Ask</button>
        <div class="bar" id="abarwrap" style="display:none"><i id="abar"></i></div>
        <div class="stage" id="astage"></div>
        <div class="answer" id="answer" style="display:none"></div>
        <div class="src" id="sources"></div>
      </div>

      <footer style="text-align:center;color:var(--muted);font-size:13px;margin-top:6px">
        Built by <a href="https://www.linkedin.com/in/samuel-adone" target="_blank" rel="noopener"
                    style="color:var(--accent)">Samuel Adone</a>
      </footer>
    </main>

    <aside class="metrics card">
      <h2>System</h2>
      <div class="metric">
        <div class="top"><span>CPU</span><b id="cpuVal">–</b></div>
        <canvas id="cpuG" width="240" height="44"></canvas>
      </div>
      <div class="metric">
        <div class="top"><span>RAM</span><b id="ramVal">–</b></div>
        <canvas id="ramG" width="240" height="44"></canvas>
      </div>
      <div class="metric">
        <div class="top"><span>Network ↓</span><b id="netVal">–</b></div>
        <canvas id="netG" width="240" height="44"></canvas>
      </div>
    </aside>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
async function post(url, body) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'},
                             body: JSON.stringify(body)});
  return r.json();
}

// --- theme ---
function applyTheme(t){
  document.documentElement.classList.toggle('light', t === 'light');
  $('theme').textContent = t === 'light' ? '☀️' : '🌙';
}
let theme = localStorage.getItem('theme') || 'dark';
applyTheme(theme);
$('theme').onclick = () => { theme = theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', theme); applyTheme(theme); };

// --- stopwatch + ETA + quips ---
const QUIPS = [
  "Summoning papers from the archives…",
  "Politely asking OpenAlex for everything…",
  "Teaching robots to read PDFs…",
  "Untangling author affiliations…",
  "Extracting wisdom, one page at a time…",
  "Dusting off the preprints…",
  "Convincing publishers to share…",
  "Counting references so you don't have to…",
  "Following the citation trail…",
  "Brewing coffee for the CPU…",
];
let _watch = null, _quip = null, _t0 = 0;
const fmt = s => Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');

function startFun(){
  _t0 = Date.now();
  $('fun').style.display = 'block';
  document.querySelector('.bounce').style.display = '';
  $('watch').textContent = '0:00'; $('eta').textContent = '';
  $('quip').style.opacity = 1; $('quip').textContent = QUIPS[0];
  _watch = setInterval(() => { $('watch').textContent = fmt((Date.now()-_t0)/1000); }, 250);
  let i = 0;
  _quip = setInterval(() => { i = (i+1)%QUIPS.length;
    $('quip').style.opacity = 0;
    setTimeout(() => { $('quip').textContent = QUIPS[i]; $('quip').style.opacity = 1; }, 220);
  }, 3000);
}
function updateETA(p){
  const el = (Date.now()-_t0)/1000;
  if (p >= 5 && p < 100) $('eta').textContent = '~ ' + fmt(el*(100-p)/p) + ' remaining';
  else if (p < 5) $('eta').textContent = 'estimating…';
}
function stopFun(ok){
  clearInterval(_watch); clearInterval(_quip);
  document.querySelector('.bounce').style.display = 'none';
  $('eta').textContent = '';
  $('quip').textContent = ok ? ('Finished in ' + $('watch').textContent + ' 🎉') : '';
}

// --- build ---
$('go').onclick = async () => {
  const topic = $('topic').value.trim();
  if (!topic) { $('stage').textContent = 'Enter a topic first.'; return; }
  $('go').disabled = true; $('bar').style.width = '2%';
  $('stage').textContent = 'Starting…'; $('qa').classList.add('disabled');
  const {job_id, error} = await post('/build', {
    topic, date_from: $('from').value, date_to: $('to').value, n: +$('n').value });
  if (error || !job_id) { $('stage').textContent = error || 'Failed to start.';
                          $('go').disabled = false; return; }
  startFun();
  poll(job_id);
};

function poll(job) {
  const t = setInterval(async () => {
    const s = await (await fetch('/status?job=' + job)).json();
    $('bar').style.width = (s.progress||0) + '%';
    $('stage').textContent = s.stage || '';
    updateETA(s.progress || 0);
    if (s.done) {
      clearInterval(t); $('go').disabled = false; stopFun(!s.error);
      if (!s.error) { $('qa').classList.remove('disabled'); $('q').focus(); }
    }
  }, 500);
}

// --- ask ---
$('ask').onclick = async () => {
  const question = $('q').value.trim();
  if (!question) return;
  $('ask').disabled = true; $('answer').style.display = 'none'; $('sources').textContent = '';
  $('abarwrap').style.display = 'block'; $('abar').style.width = '100%';
  $('abar').style.transition = 'none'; $('abar').style.opacity = '.6';
  $('astage').textContent = 'Thinking with global model…';
  const res = await post('/ask', {question});
  $('abarwrap').style.display = 'none'; $('astage').textContent = '';
  $('ask').disabled = false;
  if (res.error) { $('astage').textContent = res.error; return; }
  $('answer').style.display = 'block'; $('answer').textContent = res.answer;
  if (res.sources && res.sources.length)
    $('sources').textContent = 'Sources: ' +
      res.sources.map(s => '“' + s.title + '”').join('  ·  ');
};
$('q').addEventListener('keydown', e => { if (e.key === 'Enter') $('ask').click(); });

// --- live system metrics ---
const cpuD = [], ramD = [], netD = [], MAXP = 60;
function push(a, v){ a.push(v); if (a.length > MAXP) a.shift(); }
function spark(cv, data, fixedMax, color){
  const ctx = cv.getContext('2d'), w = cv.width, h = cv.height;
  ctx.clearRect(0,0,w,h);
  if (!data.length) return;
  const max = fixedMax || Math.max(...data, 1);
  ctx.beginPath();
  data.forEach((v,i) => { const x = w*i/Math.max(1,MAXP-1), y = h - (v/max)*(h-4) - 2;
    i ? ctx.lineTo(x,y) : ctx.moveTo(x,y); });
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
  ctx.lineTo(w*(data.length-1)/Math.max(1,MAXP-1), h); ctx.lineTo(0, h); ctx.closePath();
  ctx.globalAlpha = .15; ctx.fillStyle = color; ctx.fill(); ctx.globalAlpha = 1;
}
const fmtNet = k => k >= 1024 ? (k/1024).toFixed(1)+' MB/s' : Math.round(k)+' KB/s';
async function pollMetrics(){
  try {
    const m = await (await fetch('/metrics')).json();
    push(cpuD, m.cpu); push(ramD, m.ram); push(netD, m.net_kbps);
    $('cpuVal').textContent = m.cpu + '%';
    $('ramVal').textContent = m.ram + '%';
    $('netVal').textContent = fmtNet(m.net_kbps);
    spark($('cpuG'), cpuD, 100, '#6ea8fe');
    spark($('ramG'), ramD, 100, '#3fb950');
    spark($('netG'), netD, 0,   '#e3b341');
  } catch (e) {}
}
setInterval(pollMetrics, 1000); pollMetrics();
</script></body></html>
